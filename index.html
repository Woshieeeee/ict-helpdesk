<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICT Help Desk</title>
<link rel="stylesheet" href="css/style.css">
<style>
    .success-message {
        display: none;
        background: #4CAF50;
        color: white;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 5px;
        text-align: center;
    }

    .success-message.show {
        display: block;
        animation: slideDown 0.3s ease-in;
    }

    @keyframes slideDown {
        from { transform: translateY(-20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .ticket-tracker {
        display: none;
        background: #f5f5f5;
        border-left: 4px solid #2196F3;
        padding: 15px;
        margin-top: 20px;
        border-radius: 5px;
    }

    .ticket-tracker.show {
        display: block;
    }

    .tracker-status {
        font-size: 12px;
        color: #666;
        margin-top: 10px;
    }

    .status-badge {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 3px;
        font-weight: bold;
        margin-top: 10px;
    }

    .status-pending { background: #ff9800; color: white; }
    .status-in-progress { background: #2196F3; color: white; }
    .status-resolved { background: #4CAF50; color: white; }
    .status-closed { background: #999; color: white; }

    /* Popup Notification Styles */
    .popup-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 2000;
        justify-content: center;
        align-items: center;
    }

    .popup-overlay.show {
        display: flex;
    }

    .popup-content {
        background: white;
        border-radius: 10px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        animation: popupSlideIn 0.3s ease-out;
        max-width: 400px;
    }

    @keyframes popupSlideIn {
        from {
            transform: scale(0.8);
            opacity: 0;
        }
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    .popup-icon {
        font-size: 48px;
        margin-bottom: 15px;
    }

    .popup-title {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 10px;
        color: #333;
    }

    .popup-message {
        font-size: 16px;
        color: #666;
        margin-bottom: 20px;
        line-height: 1.5;
    }

    .popup-button {
        background: #4CAF50;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.3s;
    }

    .popup-button:hover {
        background: #45a049;
    }

    .popup-button.error {
        background: #f44336;
    }

    .popup-button.error:hover {
        background: #da190b;
    }

    .popup-button.warning {
        background: #ff9800;
    }

    .popup-button.warning:hover {
        background: #e68900;
    }
</style>
</head>

<body>

<header>
    <h1>ICT Help Desk</h1>
    <button onclick="toggleDarkMode()">🌙</button>
</header>

<div class="container">

<div id="popupOverlay" class="popup-overlay">
    <div class="popup-content">
        <div class="popup-icon" id="popupIcon"></div>
        <div class="popup-title" id="popupTitle"></div>
        <div class="popup-message" id="popupMessage"></div>
        <button class="popup-button" id="popupButton" onclick="closePopup()">OK</button>
    </div>
</div>

<div class="card">

<div class="success-message" id="successMsg"></div>

<form id="ticketForm">

<input id="fullname" placeholder="Full Name" required>
<input id="email" placeholder="Email" required>

<select id="department">
<option>ICT</option>
<option>Finance</option>
<option>HR</option>
<option>Operations</option>
</select>

<input id="subject" placeholder="Subject" required>

<select id="category">
<option>Hardware</option>
<option>Software</option>
<option>Network</option>
<option>Printer</option>
</select>

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<textarea id="description" placeholder="Issue" required></textarea>

<button type="submit">Submit Ticket</button>

</form>

<div class="ticket-tracker" id="ticketTracker">
    <h3>📍 Your Ticket Status</h3>
    <p><b>Ticket #:</b> <span id="trackerTicketNum"></span></p>
    <p><b>Subject:</b> <span id="trackerSubject"></span></p>
    <div class="status-badge" id="trackerStatus"></div>
    <div class="tracker-status" id="trackerTime"></div>
</div>

</div>

<a href="admin.html">Admin Dashboard</a>

</div>

<audio id="notifySound" src="assets/notification.mp3"></audio>

<script src="js/config.js"></script>
<script src="js/submit.js"></script>
<script src="js/theme.js"></script>

</body>
</html>

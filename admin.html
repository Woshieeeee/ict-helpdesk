<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
    .update-notif {
        display: none;
        position: fixed;
        top: 20px;
        right: 20px;
        background: #4CAF50;
        color: white;
        padding: 12px 20px;
        border-radius: 5px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        z-index: 1000;
        animation: slideIn 0.3s ease-in;
    }
    
    @keyframes slideIn {
        from { transform: translateX(400px); }
        to { transform: translateX(0); }
    }
    
    .live-indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        background: #4CAF50;
        border-radius: 50%;
        margin-right: 5px;
        animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    /* Popup Notification Styles */
    .popup-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 2000;
        justify-content: center;
        align-items: center;
    }

    .popup-overlay.show {
        display: flex;
    }

    .popup-content {
        background: white;
        border-radius: 10px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        animation: popupSlideIn 0.3s ease-out;
        max-width: 400px;
    }

    @keyframes popupSlideIn {
        from {
            transform: scale(0.8);
            opacity: 0;
        }
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    .popup-icon {
        font-size: 48px;
        margin-bottom: 15px;
    }

    .popup-title {
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 10px;
        color: #333;
    }

    .popup-message {
        font-size: 16px;
        color: #666;
        margin-bottom: 20px;
        line-height: 1.5;
    }

    .popup-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
    }

    .popup-button {
        background: #4CAF50;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.3s;
    }

    .popup-button:hover {
        background: #45a049;
    }

    .popup-button.error {
        background: #f44336;
    }

    .popup-button.error:hover {
        background: #da190b;
    }

    .popup-button.cancel {
        background: #9e9e9e;
    }

    .popup-button.cancel:hover {
        background: #757575;
    }
</style>
</head>

<body>

<header>
<h1>Admin Dashboard <span class="live-indicator"></span> Live</h1>

<div>
<button onclick="toggleDarkMode()">🌙</button>
<button onclick="exportTickets()">📤 Export</button>
<button onclick="logout()">Logout</button>
</div>

</header>

<div class="container">

<div id="popupOverlay" class="popup-overlay">
    <div class="popup-content">
        <div class="popup-icon" id="popupIcon"></div>
        <div class="popup-title" id="popupTitle"></div>
        <div class="popup-message" id="popupMessage"></div>
        <div class="popup-buttons">
            <button class="popup-button" id="popupButton" onclick="closeAdminPopup()">OK</button>
            <button class="popup-button cancel" id="popupCancelButton" onclick="closeAdminPopup()" style="display: none;">Cancel</button>
        </div>
    </div>
</div>

<div id="updateNotif" class="update-notif">✓ Data updated</div>

<div id="stats"></div>

<canvas id="chart"></canvas>

<input id="search" placeholder="Search tickets...">

<select id="filterStatus">
<option>All</option>
<option>Pending</option>
<option>In Progress</option>
<option>Resolved</option>
<option>Closed</option>
</select>

<button onclick="loadTickets()">Apply</button>

<div id="tickets"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/config.js"></script>
<script src="js/admin.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
